name: Update Tachimanga Repo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate filtered index
        run: |
          python3 - <<'EOF'
          import json
          import urllib.request

          INDEX_URL = "https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json"
          APK_BASE  = "https://raw.githubusercontent.com/keiyoushi/extensions/repo/apk/"

          KEEP = {"MangaFire", "Sushi-Scan", "ReadComicOnline"}

          with urllib.request.urlopen(INDEX_URL) as resp:
              data = json.load(resp)

          filtered = []
          for ext in data:
              names = {s.get("name", "") for s in ext.get("sources", [])}
              if names & KEEP:
                  apk = ext.get("apk", "")
                  if apk and not apk.startswith("http"):
                      ext["apk"] = APK_BASE + apk
                  filtered.append(ext)

          with open("index.min.json", "w", encoding="utf-8") as f:
              json.dump(filtered, f, ensure_ascii=False, separators=(",", ":"))

          for ext in filtered:
              print(ext["name"], ext["version"])
          print(f"\nTotal: {len(filtered)} extensions")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.min.json
          git diff --staged --quiet || git commit -m "Update Tachimanga repo"
          git push
