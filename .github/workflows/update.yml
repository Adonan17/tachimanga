name: Update Tachimanga Repo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate filtered repo
        run: |
          python << 'EOF'
          import json
          import urllib.request

          BASE = "https://raw.githubusercontent.com/keiyoushi/extensions/repo/"
          URL = BASE + "index.min.json"

          KEEP = {
              "mangafire",
              "sushiscan",
              "sushi-scan",
              "readcomiconline",
              "read comic online"
          }

          with urllib.request.urlopen(URL) as r:
              data = json.load(r)

          filtered = []

          for ext in data:
              text = json.dumps(ext).lower().replace(" ", "")
              if any(k.replace(" ", "") in text for k in KEEP):
                  apk = ext.get("apk", "")
                  if apk and not apk.startswith("http"):
                      ext["apk"] = BASE + apk
                  filtered.append(ext)

          with open("index.min.json", "w", encoding="utf-8") as f:
              json.dump(filtered, f, ensure_ascii=False, separators=(",", ":"))

          print(f"Saved {len(filtered)} extensions")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.min.json
          git diff --staged --quiet || git commit -m "Update Tachimanga repo"
          git push
